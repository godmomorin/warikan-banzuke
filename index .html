<style>

  h1{

  footer{text-align:center;font-size:12px;color:var(--sumi-soft);padding:8px 16px 36px;letter-spacing:.06em;}

<header>

<main>
  <section class="panel">
    <h2>会計の総額</h2>
    <div class="total-row">
      <span class="yen mincho">¥</span>
      <input id="total" type="text" inputmode="numeric" value="12000" aria-label="総額">
      <span class="unit">円</span>
    </div>
  </section>

  <section class="panel">
    <h2>縦社会のきつさ</h2>
    <div class="presets" id="presets">
      <button class="preset" data-k="0">完全ワリカン</button>
      <button class="preset" data-k="5">気持ちだけ先輩</button>
      <button class="preset active" data-k="12">ふつうの縦社会</button>
      <button class="preset" data-k="30">鬼の縦社会</button>
    </div>
    <div class="slider-label">
      <span>芸歴1年差あたり、先輩の上乗せ</span>
      <b><span id="kVal">12</span>%</b>
    </div>
    <input id="kSlider" type="range" min="0" max="50" step="1" value="12">
    <div class="rule-example" id="example"></div>
    <div class="unit-label">金額の単位</div>
    <div class="units" id="units">
      <button class="unit-btn" data-u="1">1円</button>
      <button class="unit-btn" data-u="100">100円</button>
      <button class="unit-btn active" data-u="500">500円</button>
    </div>

  <section class="panel">
    <h2>メンバーと芸歴 <span class="count" id="memberCount"></span></h2>

      <span class="add-multi-label">まとめて</span>
      <input class="add-count" id="addCount" type="number" inputmode="numeric" min="1" max="30" value="3">

    </div>

  <p class="mincho">端数は先輩持ち。それが芸の世界の流儀。</p>
  <p class="about">「割勘番付」は、ピン芸人 <strong>カイディンディン</strong> が作った、芸歴で割り勘を決めるネタ計算サイトです。私たちはお会計で揉めたくない。</p>
  <button class="reset" id="resetBtn">入力をすべてリセット</button>
</footer>

<script>
(function(){
  "use strict";

  var ranks = ["大将","二番手","三番手","四番手","五番手","六番手","七番手","八番手"];

  var STORE_KEY = "warikan_banzuke_v1";

  var state = {
    total: 12000,
    k: 0.12, // 芸歴1年差あたりの上乗せ率
    unit: 500, // 金額の単位
    members: [
      { id: id(), name: "先輩", years: 10, fixed: null },
      { id: id(), name: "後輩", years: 3, fixed: null }
    ]
  };

  // 端末に保存した内容があれば復元
  (function loadState(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(!raw) return;
      var s = JSON.parse(raw);
      if(typeof s.total === "number") state.total = s.total;
      if(typeof s.k === "number") state.k = s.k;
      if(typeof s.unit === "number") state.unit = s.unit;
      if(Array.isArray(s.members) && s.members.length){
        state.members = s.members.map(function(m){
          return {
            id: m.id || id(),
            name: typeof m.name === "string" ? m.name : "",
            years: (typeof m.years === "number" && !isNaN(m.years)) ? m.years : 0,
            fixed: (typeof m.fixed === "number" && !isNaN(m.fixed)) ? m.fixed : null
          };
        });
      }
    }catch(e){ /* プライベートモード等では保存をあきらめる */ }
  })();

  function persist(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function id(){ return Math.random().toString(36).slice(2,9); }
  function yen(n){ return Math.round(n).toLocaleString("ja-JP"); }

  function isFixed(m){ return m.fixed != null && !isNaN(m.fixed); }

  // ---- 計算 ----
  function calc(){
    var ms = state.members;
    var n = ms.length;
    if(n === 0) return null;
    var total = state.total;

    var fixedMembers = ms.filter(isFixed);
    var autoMembers  = ms.filter(function(m){ return !isFixed(m); });
    var fixedSum = fixedMembers.reduce(function(a,m){ return a + m.fixed; }, 0);
    var remaining = total - fixedSum;

    var warnings = [];
    if(autoMembers.length === 0){
      if(Math.round(remaining) !== 0){
        warnings.push("固定額の合計が総額と合っていません（差 ¥"+yen(Math.abs(remaining))+"）。");
      }
    } else if(remaining < 0){
      warnings.push("固定額の合計が総額を超えています（¥"+yen(-remaining)+" オーバー）。残りは0円で計算します。");
    }

    var splitTarget = Math.max(0, remaining);
    var byId = {};

    if(autoMembers.length > 0){
      var minY = Math.min.apply(null, autoMembers.map(function(m){ return m.years; }));
      var maxY = Math.max.apply(null, autoMembers.map(function(m){ return m.years; }));
      var sumW = autoMembers.reduce(function(a,m){ return a + (1 + state.k * (m.years - minY)); }, 0);
      var target = Math.round(splitTarget);

      // 完全ワリカン(上乗せ0)は1円単位で均等に。それ以外は選んだ単位で。
      var unit = (state.k === 0) ? 1 : state.unit;

      var amounts = autoMembers.map(function(){ return 0; });

      if(sumW > 0 && target > 0){
        // 最年長グループ以外は、1人あたりを単位で切り捨て（同じ芸歴なら必ず同額）
        var nonTopSum = 0;
        autoMembers.forEach(function(m, i){
          if(m.years === maxY) return; // 最年長グループは後で計算
          var per = target * (1 + state.k * (m.years - minY)) / sumW;
          amounts[i] = Math.max(0, Math.floor(per / unit) * unit);
          nonTopSum += amounts[i];
        });
        // 残り（割り切れない端数を含む）を最年長グループで等分。1円未満の端数は先頭から
        var topIdxs = [];
        autoMembers.forEach(function(m, i){ if(m.years === maxY) topIdxs.push(i); });
        var remainingTop = Math.max(0, target - nonTopSum);
        var topCount = topIdxs.length;
        var topPer = Math.floor(remainingTop / topCount);
        var extra = remainingTop - topPer * topCount; // 0〜topCount-1（円単位の端数）
        topIdxs.forEach(function(idx, j){
          amounts[idx] = topPer + (j < extra ? 1 : 0);
        });

        // 0円になった人がいたら知らせる（少額・大人数・大きい単位のとき）
        if(amounts.some(function(a){ return a === 0; })){
          warnings.push("金額の単位が大きく、0円になった人がいます。単位を下げると揃いやすくなります。");
        }
      }

      var autoEqual = splitTarget / autoMembers.length;
      autoMembers.forEach(function(m, i){
        byId[m.id] = { amount: amounts[i], auto: true, equalRef: autoEqual };
      });
    }
    fixedMembers.forEach(function(m){ byId[m.id] = { amount: Math.round(m.fixed), auto: false }; });

    var out = ms.map(function(m, idx){
      var r = byId[m.id] || { amount: 0, auto: true, equalRef: 0 };
      var nm = (m.name && m.name.trim()) ? m.name : ("メンバー" + (idx + 1));
      return {
        id: m.id,
        name: nm,
        years: m.years,
        amount: r.amount,
        auto: r.auto,
        share: total ? r.amount / total : 0,
        delta: r.auto ? (r.amount - (r.equalRef || 0)) : 0
      };
    });
    out._warnings = warnings;
    return out;
  }

  // ---- 描画 ----
  function render(){
    renderMembers();
    renderExample();
    renderBanzuke();
  }

  function renderMembers(){
    var box = document.getElementById("members");
    box.innerHTML = "";
    var countEl = document.getElementById("memberCount");
    if(countEl) countEl.textContent = state.members.length + "人";
    state.members.forEach(function(m){
      var fixedOn = isFixed(m);
      var card = document.createElement("div");
      card.className = "member-card";
      card.innerHTML =
        '<div class="member">' +
          '<input class="name" type="text" placeholder="名前" value="'+escapeHtml(m.name)+'">' +
          '<input class="years" type="number" inputmode="numeric" min="0" value="'+m.years+'">' +
          '<span class="years-unit">年目</span>' +
          '<button class="del" aria-label="削除">×</button>' +
        '</div>' +
        '<div class="fixed-row">' +
          '<button class="fix-toggle'+(fixedOn?' active':'')+'">金額を固定</button>' +
          '<span class="yen-s">¥</span>' +
          '<input class="fixed-amt" type="text" inputmode="numeric" placeholder="自動で計算" '+
            (fixedOn ? 'value="'+m.fixed.toLocaleString("ja-JP")+'"' : 'disabled') + '>' +
          '<span class="yen-s">円</span>' +
        '</div>';

      card.querySelector(".name").addEventListener("input", function(e){ m.name = e.target.value; renderBanzuke(); });
      card.querySelector(".years").addEventListener("input", function(e){
        var v = parseInt(e.target.value,10); m.years = isNaN(v)?0:Math.max(0,v); renderExample(); renderBanzuke();
      });
      card.querySelector(".del").addEventListener("click", function(){
        state.members = state.members.filter(function(x){ return x.id !== m.id; });
        render();
      });
      card.querySelector(".fix-toggle").addEventListener("click", function(){
        if(isFixed(m)){
          m.fixed = null;
        }else{
          // いま自動で計算されている金額を初期値に入れる（0円固定の誤操作を防ぐ）
          var res = calc();
          var cur = 0;
          if(res){
            var found = res.filter(function(x){ return x.id === m.id; })[0];
            if(found) cur = found.amount;
          }
          m.fixed = cur;
        }
        render();
      });
      var fa = card.querySelector(".fixed-amt");
      fa.addEventListener("input", function(e){
        var v = e.target.value.replace(/[^\d]/g,"");
        e.target.value = v ? parseInt(v,10).toLocaleString("ja-JP") : "";
        m.fixed = v ? parseInt(v,10) : 0;
        renderExample(); renderBanzuke();
      });
      box.appendChild(card);
    });
  }

  function renderExample(){
    var el = document.getElementById("example");
    var ms = state.members;
    if(ms.some(isFixed)){
      el.innerHTML = '固定した人の金額を差し引いた<b>残り</b>を、芸歴差で配分します。';
      return;
    }
    if(state.k === 0){
      el.innerHTML = '完全ワリカンなので、1円単位でほぼ均等に分けます。';
      return;
    }
    if(ms.length === 2){
      var d = Math.abs(ms[0].years - ms[1].years);
      if(d === 0){
        el.innerHTML = '芸歴が同じなので <b>5:5</b> のワリカンです。';
      }else{
        var w = 1 + state.k * d;
        var senShare = Math.round(w/(1+w)*100);
        el.innerHTML = '芸歴差 <b>'+d+'年</b> なら、先輩 <b>約'+senShare+'%</b>／後輩 約'+(100-senShare)+'% の負担です（'+state.unit+'円単位に丸めます）。';
      }
    }else{
      el.innerHTML = '同じ芸歴は同額。割り切れない端数は<b>芸歴が一番上の人</b>が引き取ります（'+state.unit+'円単位）。';
    }
  }

  function renderBanzuke(){
    var fudaRow = document.getElementById("fudaRow");
    var detail = document.getElementById("detail");
    var warn = document.getElementById("warn");
    var res = calc();

    warn.innerHTML = (res && res._warnings && res._warnings.length)
      ? res._warnings.map(function(w){ return '<div class="warn">'+w+'</div>'; }).join("")
      : "";

    if(!res || res.length === 0){
      fudaRow.innerHTML = '<div class="empty">メンバーを追加すると<br>番付が出ます</div>';
      detail.innerHTML = "";
      return;
    }

    // 払う額が多い順に並べる
    var sorted = res.slice().sort(function(a,b){ return b.amount - a.amount; });

    fudaRow.innerHTML = "";
    sorted.forEach(function(r, i){
      var card = document.createElement("div");
      card.className = "fuda";
      var foot;
      if(r.auto){
        var deltaCls = r.delta >= 0 ? "plus" : "minus";
        var deltaTxt = (r.delta >= 0 ? "＋" : "−") + yen(Math.abs(r.delta)) + "円";
        foot = '<div class="delta '+deltaCls+'">'+deltaTxt+'</div>';
      }else{
        foot = '<div class="fixedtag">固定</div>';
      }
      var seal = (i === 0 && sorted.length > 1 && r.amount > sorted[sorted.length-1].amount)
        ? '<div class="seal mincho">奢</div>' : '';
      card.innerHTML =
        seal +
        '<div class="rank">'+(ranks[i]||((i+1)+"番手"))+'</div>' +
        '<div class="nm mincho" style="font-size:'+nameFont(r.name)+'px">'+escapeHtml(r.name)+'</div>' +
        '<div class="geireki">芸歴'+r.years+'年</div>' +
        '<div class="amt">¥'+yen(r.amount)+'</div>' +
        '<div class="share">'+(r.share*100).toFixed(0)+'%</div>' +
        foot;
      fudaRow.appendChild(card);
    });

    // 明細表
    var rows = sorted.map(function(r){
      var tag = r.auto ? "" : "（固定）";
      return '<tr><td>'+escapeHtml(r.name)+'（芸歴'+r.years+'年）'+tag+'</td><td>¥'+yen(r.amount)+'</td></tr>';
    }).join("");
    var sum = res.reduce(function(a,b){return a+b.amount;},0);
    detail.innerHTML =
      '<table><tbody>'+rows+
      '<tr class="sum"><td>合計</td><td>¥'+yen(sum)+'</td></tr>'+
      '</tbody></table>';

    // 4人以上は横スクロールのヒントを出す
    var hint = document.getElementById("scrollHint");
    if(hint) hint.classList.toggle("show", sorted.length >= 4);

    persist();
  }

  function nameFont(name){
    var L = name ? name.length : 0;
    if(L <= 4) return 22;
    if(L <= 6) return 18;
    if(L <= 8) return 15;
    if(L <= 10) return 13;
    return 11;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // ---- イベント ----
  document.getElementById("total").addEventListener("input", function(e){
    var v = e.target.value.replace(/[^\d]/g,"");
    e.target.value = v ? parseInt(v,10).toLocaleString("ja-JP") : "";
    state.total = v ? parseInt(v,10) : 0;
    renderBanzuke();
  });
  // 初期表示の整形
  (function(){ var t=document.getElementById("total"); t.value = state.total.toLocaleString("ja-JP"); })();

  var slider = document.getElementById("kSlider");
  var kVal = document.getElementById("kVal");
  slider.addEventListener("input", function(e){
    var p = parseInt(e.target.value,10);
    state.k = p/100; kVal.textContent = p;
    setActivePreset(p);
    renderExample(); renderBanzuke();
  });

  var presets = document.querySelectorAll(".preset");
  presets.forEach(function(btn){
    btn.addEventListener("click", function(){
      var p = parseInt(btn.getAttribute("data-k"),10);
      state.k = p/100; slider.value = p; kVal.textContent = p;
      setActivePreset(p);
      renderExample(); renderBanzuke();
    });
  });
  function setActivePreset(p){
    presets.forEach(function(b){
      b.classList.toggle("active", parseInt(b.getAttribute("data-k"),10) === p);
    });
  }

  document.getElementById("addBtn").addEventListener("click", function(){
    state.members.push({ id:id(), name:"", years:0, fixed:null });
    render();
    var inputs = document.querySelectorAll("#members .name");
    if(inputs.length) inputs[inputs.length-1].focus();
  });

  document.getElementById("addMultiBtn").addEventListener("click", function(){
    var c = parseInt(document.getElementById("addCount").value, 10);
    if(isNaN(c) || c < 1) c = 1;
    if(c > 30) c = 30;
    for(var i=0; i<c; i++){
      state.members.push({ id:id(), name:"", years:0, fixed:null });
    }
    render();
  });

  // ---- 金額の単位 ----
  var unitBtns = document.querySelectorAll(".unit-btn");
  function setActiveUnit(u){
    unitBtns.forEach(function(b){
      b.classList.toggle("active", parseInt(b.getAttribute("data-u"),10) === u);
    });
  }
  unitBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      state.unit = parseInt(btn.getAttribute("data-u"),10);
      setActiveUnit(state.unit);
      renderExample(); renderBanzuke();
    });
  });

  // ---- 結果のコピー・共有 ----
  function buildShareText(){
    var res = calc();
    if(!res || res.length === 0) return "";
    var sorted = res.slice().sort(function(a,b){ return b.amount - a.amount; });
    var lines = ["🍶 割勘番付（総額 ¥"+yen(state.total)+"）", ""];
    sorted.forEach(function(r, i){
      var ogori = (i === 0 && sorted.length > 1 && r.amount > sorted[sorted.length-1].amount) ? "　←おごり頭" : "";
      lines.push((i+1)+"位 "+r.name+"（芸歴"+r.years+"年） ¥"+yen(r.amount)+(r.auto ? "" : "（固定）")+ogori);
    });
    var sum = res.reduce(function(a,b){ return a+b.amount; }, 0);
    lines.push("", "合計 ¥"+yen(sum));
    return lines.join("\n");
  }
  var shareDone = document.getElementById("shareDone");
  function flash(msg){
    shareDone.textContent = msg;
    setTimeout(function(){ shareDone.textContent = ""; }, 2000);
  }
  function fallbackCopy(text){
    try{
      var ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      flash("コピーしました");
    }catch(e){ flash("コピーできませんでした"); }
  }
  document.getElementById("shareBtn").addEventListener("click", function(){
    var text = buildShareText();
    if(!text){ flash("メンバーを追加してください"); return; }
    if(navigator.share){
      navigator.share({ title: "割勘番付", text: text }).catch(function(){});
    }else if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){ flash("コピーしました"); }).catch(function(){ fallbackCopy(text); });
    }else{
      fallbackCopy(text);
    }
  });

  // ---- 保存内容をUIに反映 ----
  function syncControls(){
    document.getElementById("total").value = state.total ? state.total.toLocaleString("ja-JP") : "";
    var p = Math.round(state.k * 100);
    slider.value = p; kVal.textContent = p; setActivePreset(p);
    setActiveUnit(state.unit);
  }

  // ---- リセット ----
  document.getElementById("resetBtn").addEventListener("click", function(){
    if(!window.confirm("入力をすべて消して、最初の状態に戻しますか？")) return;
    try{ localStorage.removeItem(STORE_KEY); }catch(e){}
    state.total = 12000;
    state.k = 0.12;
    state.unit = 500;
    state.members = [
      { id: id(), name: "先輩", years: 10, fixed: null },
      { id: id(), name: "後輩", years: 3, fixed: null }
    ];
    syncControls();
    render();
  });

  syncControls();
  render();
})();
</script>
</body>
